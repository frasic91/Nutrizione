<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Calcolatore Settimanale Nutrizione</title>
    <script>
        // Versioning automatico per CSS e JS: usa timestamp per forzare refresh
        const v = new Date().getTime();
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = `style.css?v=${v}`;
        document.head.appendChild(link);
    </script>
    <style>
        /* Stile interno (puoi anche spostarlo in style.css) */
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background-color: #f4f4f4;
        }

        h2 {
            text-align: center;
        }

        input, select, button {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .reset-btn {
            background-color: #f44336;
        }

        .reset-btn:hover {
            background-color: #da190b;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 8px;
            border: 1px solid #ccc;
            text-align: center;
        }

        th {
            background-color: #ddd;
        }

        .totale {
            font-weight: bold;
            background-color: #e0ffe0;
        }
    </style>
</head>
<body>

<h2>Calcolatore Nutrizione Settimanale</h2>

<label for="peso">Peso Kg Obiettivo:</label>
<input type="number" id="peso" name="peso" min="0" step="0.1" value="0" placeholder="Inserisci peso in kg">
<p>Valore peso: <span id="pesoDisplay">0</span> kg</p>

<label for="giorno">Giorno:</label>
<select id="giorno">
    <option>Lunedì</option>
    <option>Martedì</option>
    <option>Mercoledì</option>
    <option>Giovedì</option>
    <option>Venerdì</option>
    <option>Sabato</option>
    <option>Domenica</option>
</select>

<label for="km">Km corsa:</label>
<input type="number" id="km" min="0" step="0.1" placeholder="Inserisci km corsa">

<label for="deficit">Deficit calorico:</label>
<input type="number" id="deficit" min="0" step="1" placeholder="Inserisci deficit calorico">

<label for="proteine">Proteine in % (es. 20):</label>
<input type="number" id="proteine" min="0" max="100" step="1" placeholder="Inserisci % proteine">

<label for="grassi">Grassi in % (es. 20):</label>
<input type="number" id="grassi" min="0" max="100" step="1" placeholder="Inserisci % grassi">

<label for="carbo">Carbo in % (es. 20):</label>
<input type="number" id="carbo" min="0" max="100" step="1" placeholder="Inserisci % carboidrati">

<button onclick="calcola()">Salva Giorno</button>
<button class="reset-btn" onclick="resetSettimana()">Cancella Settimana</button>

<table>
    <thead>
        <tr>
            <th>Giorno</th>
            <th>Calorie</th>
            <th>Proteine (g)</th>
            <th>% Proteine</th>
            <th>Carbo (g)</th>
            <th>% Carbo</th>
            <th>Grassi (g)</th>
            <th>% Grassi</th>
            <th>Km corsa</th>
        </tr>
    </thead>
    <tbody id="tabella"></tbody>
    <tfoot>
        <tr class="totale">
            <td>Totale Settimanale</td>
            <td id="totCal"></td>
            <td id="totPro"></td>
            <td id="totProPerc"></td>
            <td id="totCarb"></td>
            <td id="totCarbPerc"></td>
            <td id="totGrass"></td>
            <td id="totGrassPerc"></td>
            <td id="totKm"></td>
        </tr>
    </tfoot>
</table>

<script>
    // Versioning automatico JS
    const v = new Date().getTime();
    // ---- Codice della tua app ----

    let dati = JSON.parse(localStorage.getItem("settimana")) || {};
    const giorniOrdine = ["Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato","Domenica"];

    // Anteprima peso
    const pesoInput = document.getElementById('peso');
    const pesoDisplay = document.getElementById('pesoDisplay');
    pesoInput.addEventListener('input', () => {
        pesoDisplay.textContent = pesoInput.value;
    });

    function calcola() {
        let giorno = document.getElementById("giorno").value;
        let km = parseFloat(document.getElementById("km").value) || 0;
        let deficit = parseFloat(document.getElementById("deficit").value) || 0;
        let peso = parseFloat(document.getElementById("peso").value) || 0;
        let proteine_perc = parseFloat(document.getElementById("proteine").value) || 0;
        let grassi_perc = parseFloat(document.getElementById("grassi").value) || 0;
        let carbo_perc = parseFloat(document.getElementById("carbo").value) || 0;

        let calorieBase = 1500;
        let calorieCorsa = km * peso;
        let TDEE = 100;
        let calorieTotali = calorieBase + calorieCorsa + TDEE - deficit;
        if (calorieTotali < 0) calorieTotali = 0;

        let proteine = (calorieTotali * (proteine_perc / 100)) / 4;
        let carboidrati = (calorieTotali * (carbo_perc / 100)) / 4;
        let grassi = (calorieTotali * (grassi_perc / 100)) / 9;

        dati[giorno] = {
            calorie: calorieTotali,
            proteine,
            carbo: carboidrati,
            grassi,
            proteinePerc: proteine_perc,
            carboPerc: carbo_perc,
            grassiPerc: grassi_perc,
            km
        };

        localStorage.setItem("settimana", JSON.stringify(dati));

        document.getElementById("km").value = '';
        document.getElementById("deficit").value = '';
        document.getElementById("proteine").value = '';
        document.getElementById("grassi").value = '';
        document.getElementById("carbo").value = '';

        aggiornaTabella();
    }

    function aggiornaTabella() {
        let tbody = document.getElementById("tabella");
        tbody.innerHTML = "";

        let totCal = 0, totPro = 0, totCarb = 0, totGrass = 0, totKm = 0;
        let totProPerc = 0, totCarbPerc = 0, totGrassPerc = 0;
        let count = 0;

        giorniOrdine.forEach(giorno => {
            if(dati[giorno]) {
                let riga = `
                    <tr>
                        <td>${giorno}</td>
                        <td>${dati[giorno].calorie.toFixed(0)}</td>
                        <td>${dati[giorno].proteine.toFixed(1)} g</td>
                        <td>${dati[giorno].proteinePerc}%</td>
                        <td>${dati[giorno].carbo.toFixed(1)} g</td>
                        <td>${dati[giorno].carboPerc}%</td>
                        <td>${dati[giorno].grassi.toFixed(1)} g</td>
                        <td>${dati[giorno].grassiPerc}%</td>
                        <td>${dati[giorno].km.toFixed(1)}</td>
                    </tr>
                `;
                tbody.innerHTML += riga;

                totCal += dati[giorno].calorie;
                totPro += dati[giorno].proteine;
                totCarb += dati[giorno].carbo;
                totGrass += dati[giorno].grassi;
                totKm += dati[giorno].km;

                totProPerc += dati[giorno].proteinePerc;
                totCarbPerc += dati[giorno].carboPerc;
                totGrassPerc += dati[giorno].grassiPerc;

                count++;
            }
        });

        document.getElementById("totCal").innerText = totCal.toFixed(0);
        document.getElementById("totPro").innerText = totPro.toFixed(1) + " g";
        document.getElementById("totCarb").innerText = totCarb.toFixed(1) + " g";
        document.getElementById("totGrass").innerText = totGrass.toFixed(1) + " g";

        document.getElementById("totProPerc").innerText = count ? (totProPerc / count).toFixed(1) + "%" : "0%";
        document.getElementById("totCarbPerc").innerText = count ? (totCarbPerc / count).toFixed(1) + "%" : "0%";
        document.getElementById("totGrassPerc").innerText = count ? (totGrassPerc / count).toFixed(1) + "%" : "0%";

        document.getElementById("totKm").innerText = totKm.toFixed(1);
    }

    function resetSettimana() {
        if(confirm("Sei sicuro di voler cancellare tutti i dati della settimana?")) {
            dati = {};
            localStorage.removeItem("settimana");
            aggiornaTabella();
        }
    }

    aggiornaTabella();
</script>

</body>
</html>
