<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Calcolatore Settimanale Nutrizione</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: auto;
            padding: 20px;
            background-color: #f4f4f4;
        }

        h2 {
            text-align: center;
        }

        input, select, button {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }

        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .reset-btn {
            background-color: #f44336;
        }

        .reset-btn:hover {
            background-color: #da190b;
        }

        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 8px;
            border: 1px solid #ccc;
            text-align: center;
        }

        th {
            background-color: #ddd;
        }

        .totale {
            font-weight: bold;
            background-color: #e0ffe0;
        }
    </style>
</head>
<body>

<h2>Calcolatore Nutrizione Settimanale</h2>

<label for="peso">Peso Kg Obiettivo:</label>
<input type="number" id="peso" min="0" step="0.1" value="0" placeholder="Inserisci peso in kg">
<p>Valore peso: <span id="pesoDisplay">0</span> kg</p>

<label for="giorno">Giorno:</label>
<select id="giorno">
    <option value="Lunedì">Lunedì</option>
    <option value="Martedì">Martedì</option>
    <option value="Mercoledì">Mercoledì</option>
    <option value="Giovedì">Giovedì</option>
    <option value="Venerdì">Venerdì</option>
    <option value="Sabato">Sabato</option>
    <option value="Domenica">Domenica</option>
</select>

<label for="km">Km corsa:</label>
<input type="number" id="km" min="0" step="0.1" placeholder="Inserisci km corsa">

<label for="deficit">Deficit calorico:</label>
<input type="number" id="deficit" min="0" step="1" placeholder="Inserisci deficit calorico">

<label for="proteine">Proteine in % (es. 20):</label>
<input type="number" id="proteine" min="0" max="100" step="1" placeholder="Inserisci % proteine">

<label for="grassi">Grassi in % (es. 20):</label>
<input type="number" id="grassi" min="0" max="100" step="1" placeholder="Inserisci % grassi">

<label for="carbo">Carbo in % (es. 20):</label>
<input type="number" id="carbo" min="0" max="100" step="1" placeholder="Inserisci % carboidrati">

<button onclick="calcola()">Salva Giorno</button>
<button class="reset-btn" onclick="resetSettimana()">Cancella Settimana</button>
<button onclick="downloadExcel()">Scarica Excel</button>

<table>
    <thead>
        <tr>
            <th>Giorno</th>
            <th>% Proteine</th>
            <th>% Carbo</th>
            <th>% Grassi</th>
            <th>Km corsa</th>
            <th>Calorie</th>
            <th>Proteine (g)</th>
            <th>Carbo (g)</th>
            <th>Grassi (g)</th>
        </tr>
    </thead>
    <tbody id="tabella"></tbody>
    <tfoot>
        <tr class="totale">
            <td>Totale Settimanale</td>
            <td id="totProPerc"></td>
            <td id="totCarbPerc"></td>
            <td id="totGrassPerc"></td>
            <td id="totKm"></td>
            <td id="totCal"></td>
            <td id="totPro"></td>
            <td id="totCarb"></td>
            <td id="totGrass"></td>
        </tr>
    </tfoot>
</table>

<script>
let dati = JSON.parse(localStorage.getItem("settimana")) || {};
const giorniOrdine = ["Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato","Domenica"];

// Anteprima peso
const pesoInput = document.getElementById('peso');
const pesoDisplay = document.getElementById('pesoDisplay');
pesoInput.addEventListener('input', () => {
    pesoDisplay.textContent = pesoInput.value;
});

function calcola() {
    const giorno = document.getElementById("giorno").value;
    const km = parseFloat(document.getElementById("km").value) || 0;
    const deficit = parseFloat(document.getElementById("deficit").value) || 0;
    const peso = parseFloat(document.getElementById("peso").value) || 0;
    const proteinePerc = parseFloat(document.getElementById("proteine").value) || 0;
    const grassiPerc = parseFloat(document.getElementById("grassi").value) || 0;
    const carboPerc = parseFloat(document.getElementById("carbo").value) || 0;

    const calorieBase = 1500;
    const calorieCorsa = km * peso;
    const TDEE = 100;
    const calorieTotali = Math.max(0, calorieBase + calorieCorsa + TDEE - deficit);

    const proteineGr = (calorieTotali * (proteinePerc/100)) / 4;
    const carboGr = (calorieTotali * (carboPerc/100)) / 4;
    const grassiGr = (calorieTotali * (grassiPerc/100)) / 9;

    dati[giorno] = {
        proteinePerc,
        carboPerc,
        grassiPerc,
        km,
        calorie: calorieTotali,
        proteine: proteineGr,
        carbo: carboGr,
        grassi: grassiGr
    };

    localStorage.setItem("settimana", JSON.stringify(dati));

    document.getElementById("km").value = '';
    document.getElementById("deficit").value = '';
    document.getElementById("proteine").value = '';
    document.getElementById("grassi").value = '';
    document.getElementById("carbo").value = '';

    aggiornaTabella();
}

function aggiornaTabella() {
    const tbody = document.getElementById("tabella");
    tbody.innerHTML = "";

    let totCal = 0, totPro = 0, totCarb = 0, totGrass = 0, totKm = 0;
    let totProPerc = 0, totCarbPerc = 0, totGrassPerc = 0;
    let count = 0;

    giorniOrdine.forEach(giorno => {
        const d = dati[giorno];
        if(d) {
            tbody.innerHTML += `
                <tr>
                    <td>${giorno}</td>
                    <td>${d.proteinePerc}%</td>
                    <td>${d.carboPerc}%</td>
                    <td>${d.grassiPerc}%</td>
                    <td>${d.km.toFixed(1)}</td>
                    <td>${d.calorie.toFixed(0)}</td>
                    <td>${d.proteine.toFixed(1)} g</td>
                    <td>${d.carbo.toFixed(1)} g</td>
                    <td>${d.grassi.toFixed(1)} g</td>
                </tr>
            `;

            totCal += d.calorie;
            totPro += d.proteine;
            totCarb += d.carbo;
            totGrass += d.grassi;
            totKm += d.km;

            totProPerc += d.proteinePerc;
            totCarbPerc += d.carboPerc;
            totGrassPerc += d.grassiPerc;
            count++;
        }
    });

    document.getElementById("totCal").innerText = totCal.toFixed(0);
    document.getElementById("totPro").innerText = totPro.toFixed(1) + " g";
    document.getElementById("totCarb").innerText = totCarb.toFixed(1) + " g";
    document.getElementById("totGrass").innerText = totGrass.toFixed(1) + " g";
    document.getElementById("totKm").innerText = totKm.toFixed(1);

    document.getElementById("totProPerc").innerText = count ? (totProPerc/count).toFixed(1) + "%" : "0%";
    document.getElementById("totCarbPerc").innerText = count ? (totCarbPerc/count).toFixed(1) + "%" : "0%";
    document.getElementById("totGrassPerc").innerText = count ? (totGrassPerc/count).toFixed(1) + "%" : "0%";
}

function resetSettimana() {
    if(confirm("Sei sicuro di voler cancellare tutti i dati della settimana?")) {
        dati = {};
        localStorage.removeItem("settimana");
        aggiornaTabella();
    }
}

function downloadExcel() {
    if (Object.keys(dati).length === 0) {
        alert("Non ci sono dati da scaricare!");
        return;
    }

    let csvContent = "Giorno,% Proteine,% Carbo,% Grassi,Km corsa,Calorie,Proteine (g),Carbo (g),Grassi (g)\n";

    giorniOrdine.forEach(giorno => {
        const d = dati[giorno];
        if(d) {
            csvContent += `${giorno},${d.proteinePerc},${d.carboPerc},${d.grassiPerc},${d.km.toFixed(1)},${d.calorie.toFixed(0)},${d.proteine.toFixed(1)},${d.carbo.toFixed(1)},${d.grassi.toFixed(1)}\n`;
        }
    });

    // Totali
    let totCal = 0, totPro = 0, totCarb = 0, totGrass = 0, totKm = 0;
    let totProPerc = 0, totCarbPerc = 0, totGrassPerc = 0;
    let count = 0;
    giorniOrdine.forEach(giorno => {
        const d = dati[giorno];
        if(d) {
            totCal += d.calorie;
            totPro += d.proteine;
            totCarb += d.carbo;
            totGrass += d.grassi;
            totKm += d.km;
            totProPerc += d.proteinePerc;
            totCarbPerc += d.carboPerc;
            totGrassPerc += d.grassiPerc;
            count++;
        }
    });

    csvContent += `Totale Settimanale,${(totProPerc/count).toFixed(1)},${(totCarbPerc/count).toFixed(1)},${(totGrassPerc/count).toFixed(1)},${totKm.toFixed(1)},${totCal.toFixed(0)},${totPro.toFixed(1)},${totCarb.toFixed(1)},${totGrass.toFixed(1)}\n`;

    const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "SettimanaNutrizione.csv";
    link.style.display = "none";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

aggiornaTabella();
</script>

</body>
</html>
